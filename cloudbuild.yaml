# Cloud Build configuration for Sequential Narrative AI
# Deploys both frontend and backend to Google Cloud Run

substitutions:
  _REGION: us-central1
  _PROJECT_ID: sequential-narrative-ai
  _FRONTEND_SERVICE: narrative-ai-frontend
  _BACKEND_SERVICE: narrative-ai-backend

steps:
  # ========== Backend ==========
  
  # Build backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend/'
    id: 'build-backend'

  # Push backend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:$COMMIT_SHA'
    id: 'push-backend'
    waitFor: ['build-backend']

  # Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_BACKEND_SERVICE}'
      - '--image'
      - 'gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '8888'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'OPENROUTER_API_KEY=${_OPENROUTER_API_KEY},TMDB_API_KEY=${_TMDB_API_KEY},YOUTUBE_API_KEY=${_YOUTUBE_API_KEY}'
    id: 'deploy-backend'
    waitFor: ['push-backend']

  # Get backend URL for frontend build
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} \
          --format='value(status.url)' > /workspace/backend_url.txt
        echo "Backend URL: $(cat /workspace/backend_url.txt)"
    id: 'get-backend-url'
    waitFor: ['deploy-backend']

  # ========== Frontend ==========
  
  # Build frontend image with backend URL
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        docker build \
          -t gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:$COMMIT_SHA \
          -t gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:latest \
          --build-arg VITE_API_URL=$${BACKEND_URL} \
          -f Dockerfile.frontend \
          .
    id: 'build-frontend'
    waitFor: ['get-backend-url']

  # Push frontend image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:$COMMIT_SHA'
    id: 'push-frontend'
    waitFor: ['build-frontend']

  # Deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_FRONTEND_SERVICE}'
      - '--image'
      - 'gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--port'
      - '80'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--allow-unauthenticated'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']

  # Print deployment URLs
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "============================================"
        echo "🚀 Deployment Complete!"
        echo "============================================"
        echo ""
        echo "Frontend URL:"
        gcloud run services describe ${_FRONTEND_SERVICE} --region=${_REGION} --format='value(status.url)'
        echo ""
        echo "Backend URL:"
        gcloud run services describe ${_BACKEND_SERVICE} --region=${_REGION} --format='value(status.url)'
        echo ""
        echo "============================================"
    id: 'print-urls'
    waitFor: ['deploy-frontend']

images:
  - 'gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:$COMMIT_SHA'
  - 'gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:$COMMIT_SHA'
  - 'gcr.io/${_PROJECT_ID}/${_BACKEND_SERVICE}:latest'
  - 'gcr.io/${_PROJECT_ID}/${_FRONTEND_SERVICE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
